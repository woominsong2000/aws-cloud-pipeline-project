name: 'Terraform CD (Deploy)'

# 언제 이 파이프라인을 실행할 것인가?
on:
  push:
    branches:
      - main  # main 브랜치에 코드가 푸시되거나 PR이 병합될 때만 실행 하는거로 했습니다 ㅎㅎ

jobs:
  terraform-apply:
    name: 'Terraform Apply (Auto Deploy)'
    runs-on: ubuntu-latest

    # AWS 및 테라폼 변수 설정 (GitHub Secrets에 저장된 값을 불러옵니다) 그 tfvars랑은 다른거에요
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-northeast-2' # 서울 리전

      # 이전에 설정한 슬랙 웹훅 URL을 테라폼 변수로 넘겨주는거
      TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      # 1. 깃허브에서 최신 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0 # 현재 사용 중인 테라폼 버전에 맞게 수정하세요

      # 3. 테라폼 초기화 (.terraform 폴더 생성 및 플러그인 다운로드)
      - name: Terraform Init
        run: terraform init

      # 4. 테라폼 배포 (자동 승인)
      - name: Terraform Apply
        # -auto-approve 옵션이 있어야 중간에 묻지 않고 끝까지 배포됩니다.
        run: terraform apply -auto-approve