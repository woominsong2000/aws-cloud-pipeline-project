name: 'Terraform CI'

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라올 때 실행 하는거 ci 를 하는 이유
  pull_request:
    branches: [ "main" ] # main으로 합쳐달라는 요청이 올 때 실행

jobs:
  terraform-check:
    name: 'Terraform Lint and Validate'
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0 # 팀에서 사용하는 버전으로 맞추세요

      # 3. 테라폼 초기화
      - name: Terraform Init
        run: terraform init -backend=false

      # 4. 테라폼 포맷 검사
      - name: Terraform Format
        run: terraform fmt -check

      # 5. 테라폼 문법 및 논리 검사
      - name: Terraform Validate
        run: terraform validate